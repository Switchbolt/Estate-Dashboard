var SNAP_TOTAL_INVEST = 4902585;
var MUNIS_MV = 391944, FUNDS_MV = 106408, CASH_MV = 23071;

var STOOQ_OVERRIDES = {
  'BAESY':'BAESY.US','NSRGY':'NSRGY.US','ABEV':'ABEV.US','BABA':'BABA.US',
  'SDZNY':'SDZNY.US','SOUHY':'SOUHY.US','SNY':'SNY.US','NVS':'NVS.US',
  'TEVA':'TEVA.US','TSM':'TSM.US','PDI':'PDI.US','SCHE':'SCHE.US','XHB':'XHB.US',
  'SOLV':'SOLV.US','SOLS':'SOLS.US','FTRE':'FTRE.US','WDS':'WDS.US',
};

function stooqSym(sym) {
  return STOOQ_OVERRIDES[sym] || (sym + '.US');
}

async function fetchStooq(sym) {
  var ssym = stooqSym(sym);
  var url = 'https://stooq.com/q/l/?s=' + ssym + '&f=sd2t2ohlcv&h&e=csv';
  var r = await fetch(url);
  if (!r.ok) return null;
  var text = await r.text();
  var lines = text.trim().split('\n');
  if (lines.length < 2) return null;
  var parts = lines[1].split(',');
  if (parts.length < 6) return null;
  var close = parseFloat(parts[5]);
  var open  = parseFloat(parts[2]);
  if (!close || isNaN(close)) return null;
  return { price: close, change: close - open, changePct: open > 0 ? (close - open) / open * 100 : 0 };
}

async function fetchYahoo(sym) {
  // Try Vercel serverless proxy first (avoids CORS), then fall back to direct
  var endpoints = [
    '/api/quote?sym=' + sym,
    'https://query1.finance.yahoo.com/v8/finance/chart/' + sym + '?interval=1d&range=1d',
    'https://query2.finance.yahoo.com/v8/finance/chart/' + sym + '?interval=1d&range=1d',
  ];
  for (var i = 0; i < endpoints.length; i++) {
    try {
      var r = await fetch(endpoints[i]);
      if (!r.ok) continue;
      var d = await r.json();
      var meta = d && d.chart && d.chart.result && d.chart.result[0] && d.chart.result[0].meta;
      if (!meta || !meta.regularMarketPrice) continue;
      var prev = meta.chartPreviousClose || meta.previousClose || meta.regularMarketPrice;
      var price = meta.regularMarketPrice;
      return { price: price, change: price - prev, changePct: prev > 0 ? (price - prev) / prev * 100 : 0 };
    } catch(e) {}
  }
  return null;
}

async function fetchOne(sym) {
  try {
    var yf = await fetchYahoo(sym);
    if (yf) return { ...yf, source: 'Yahoo' };
  } catch(e) {}
  try {
    var sq = await fetchStooq(sym);
    if (sq) return { ...sq, source: 'Stooq' };
  } catch(e) {}
  return null;
}

async function fetchAllPrices(onProgress) {
  var syms = HOLDINGS.map(function(h) { return h.sym; });
  var results = {}, done = 0;
  var CONC = 10;
  for (var i = 0; i < syms.length; i += CONC) {
    var batch = syms.slice(i, i + CONC);
    var batchRes = await Promise.all(batch.map(function(sym) {
      return fetchOne(sym).then(function(r) { return { sym, data: r }; });
    }));
    batchRes.forEach(function(br) { if (br.data) results[br.sym] = br.data; });
    done += batch.length;
    if (onProgress) onProgress(Math.round(done / syms.length * 100));
    if (i + CONC < syms.length) await new Promise(function(r) { setTimeout(r, 150); });
  }
  return results;
}

function parsePastedCSV(text) {
  var lines = text.trim().split('\n').filter(function(l) { return l.trim(); });
  var prices = {};
  var hasHeader = /symbol|ticker|price|value/i.test(lines[0]);
  var start = hasHeader ? 1 : 0;
  for (var i = start; i < lines.length; i++) {
    var parts = lines[i].split(/[,\t]/);
    if (parts.length < 2) continue;
    var sym = parts[0].trim().replace(/"/g, '').toUpperCase();
    var price = null;
    for (var j = 1; j < parts.length; j++) {
      var v = parseFloat(parts[j].replace(/[$,"]/g, ''));
      if (!isNaN(v) && v > 0.01 && v < 100000) { price = v; break; }
    }
    if (sym && price) prices[sym] = { price, change: null, changePct: null, source: 'Pasted' };
  }
  return prices;
}

function calcPortfolio(prices) {
  var rows = HOLDINGS.map(function(h) {
    var q = prices[h.sym];
    var livePrice = q ? q.price : null;
    var liveMv = livePrice != null ? Math.round(livePrice * h.qty * 100) / 100 : h.snapMv;
    var chgFromSnap = liveMv - h.snapMv;
    var chgPct = h.snapMv > 0 ? chgFromSnap / h.snapMv * 100 : 0;
    return { sym: h.sym, qty: h.qty, cb: h.cb,
      snapPrice: h.snapPrice, snapMv: h.snapMv,
      livePrice: livePrice != null ? livePrice : h.snapPrice,
      liveMv, chgFromSnap, chgPct,
      dayChange: q ? q.change : null,
      dayChangePct: q ? q.changePct : null,
      source: q ? (q.source || 'Live') : 'Snap',
      fetched: livePrice != null };
  });
  var fetchedCount = rows.filter(function(r) { return r.fetched; }).length;
  var liveEquityMv = rows.reduce(function(s, r) { return s + r.liveMv; }, 0);
  var totalLive = liveEquityMv + MUNIS_MV + FUNDS_MV + CASH_MV;
  var dayPnL = rows.reduce(function(s, r) {
    return s + (r.dayChange != null ? r.dayChange * r.qty : 0);
  }, 0);
  var sorted = rows.slice().sort(function(a,b){return b.chgFromSnap-a.chgFromSnap;});
  return { rows, liveEquityMv, totalLive,
    chgFromSnap: totalLive - SNAP_TOTAL_INVEST,
    dayPnL, fetchedCount,
    topGainers: sorted.slice(0,8),
    topLosers:  sorted.slice(-8).reverse() };
}
